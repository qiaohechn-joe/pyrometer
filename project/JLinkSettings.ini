[BREAKPOINTS]
ForceImpTypeAny        = 0         ; 强制使用任意实现类型的断点（一般为0）
ShowInfoWin            = 1         ; 显示信息窗口
EnableFlashBP          = 2         ; 允许在Flash中设置断点
BPDuringExecution      = 0         ; 执行期间是否允许断点设置

[CFI]
CFISize                = 0x00      ; CFI大小（未设置）
CFIAddr                = 0x00      ; CFI地址（未设置）

[CPU]
MonModeVTableAddr      = 0xFFFFFFFF ; 监视模式中断向量表地址（无效值）
MonModeDebug           = 0          ; 是否启用监视模式调试
MaxNumAPs              = 0          ; 最大访问端口数量（默认）
LowPowerHandlingMode   = 0          ; 低功耗处理模式（默认）
OverrideMemMap         = 0          ; 是否覆盖默认内存映射
AllowSimulation        = 1          ; 允许仿真（模拟调试）
ScriptFile             = ""         ; 脚本文件路径（未配置）

[FLASH]
RMWThreshold           = 0x400      ; 读改写的最小阈值（1KB）
Loaders                = ""         ; Flash加载器路径（未配置）
EraseType              = 0x00       ; 擦除类型（默认）
CacheExcludeSize       = 0x00       ; 缓存排除大小（未使用）
CacheExcludeAddr       = 0x00       ; 缓存排除地址（未使用）
MinNumBytesFlashDL     = 0          ; Flash下载的最小字节数（默认）
SkipProgOnCRCMatch     = 0          ; CRC匹配时跳过编程
VerifyDownload         = 1          ; 启用下载后校验
AllowCaching           = 0          ; 允许缓存Flash块
EnableFlashDL          = 1          ; 启用Flash下载（扩展模式）
Override               = 1          ; 是否覆盖默认Flash设置
Device                 = "STM32F407VE"     ; 目标设备类型

[GENERAL]
WorkRAMSize            = 0x00       ; 工作RAM大小（未指定）
WorkRAMAddr            = 0x00       ; 工作RAM地址（未指定）
RAMUsageLimit          = 0x00       ; RAM使用限制（默认）

[SWO]
SWOLogFile             = ""         ; SWO日志文件路径（未设置）

[MEM]
RdOverrideOrMask       = 0x00        ; 读操作覆盖OR掩码（无）
RdOverrideAndMask      = 0xFFFFFFFF  ; 读操作覆盖AND掩码（全保留）
RdOverrideAddr         = 0xFFFFFFFF  ; 读覆盖地址（无效）
WrOverrideOrMask       = 0x00        ; 写操作覆盖OR掩码（无）
WrOverrideAndMask      = 0xFFFFFFFF  ; 写操作覆盖AND掩码（全保留）
WrOverrideAddr         = 0xFFFFFFFF  ; 写覆盖地址（无效）

[RAM]
VerifyDownload         = 0x00        ; RAM段是否校验下载数据

[DYN_MEM_MAP]
NumUserRegion          = 0x00        ; 用户定义的动态内存映射区域数量（默认）
