[clang-format-all]
Command=$P..\tools\clang-format.exe
Initial Folder=
Arguments=-style=file  -i "$E*.c" "$E*.h"
Prompt for Arguments=0
Run Minimized=0
Run Independent=0
[clang-format-current]
Command=$P..\tools\clang-format.exe
Initial Folder=
Arguments=-style=file -i !E
Prompt for Arguments=0
Run Minimized=0
Run Independent=0
